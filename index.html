<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momma Says</title>
    <style>
        body { background: #000; color: #ff4500; text-align: center; font-family: sans-serif; padding: 50px; }
        .box { border: 2px solid #ff4500; padding: 20px; border-radius: 15px; }
        button { background: #ff4500; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔥 Momma Says</h1>
        <p id="msg">"Get your ass on the scale, child!"</p>
        <input type="number" id="w" placeholder="Weight" style="width:80%; padding:10px; border-radius:5px;">
        <button onclick="document.getElementById('msg').innerText='Logged! Now go drink water.'">LOG IT</button>
    </div>
    <p style="color: #666; margin-top: 50px;">If you see this, Brenda is alive.</p>
</body>
</html>
