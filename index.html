<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Momma Says</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #050505; --accent: #ff4500; --text: #f0f0f0; --gold: #ffd700; --card: #151515; --bubble: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang TC", sans-serif; display: flex; flex-direction: column; align-items: center; padding: calc(env(safe-area-inset-top) + 20px) 20px 30px; min-height: 100vh; margin:0; }
        
        /* 頂部紀錄 */
        .header { text-align: center; margin-bottom: 25px; }
        .fire { font-size: 50px; filter: drop-shadow(0 0 15px var(--accent)); }
        .streak-val { font-size: 20px; font-weight: 900; color: var(--gold); letter-spacing: 1px; margin-top: 5px; }

        /* Brenda + 對話框 區塊 */
        .brenda-container { display: flex; align-items: flex-start; gap: 15px; width: 100%; max-width: 420px; margin-bottom: 30px; }
        
        /* 媽咪大頭貼 (圓形) */
        .brenda-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--accent); overflow: hidden; box-shadow: 0 5px 15px rgba(255,69,0,0.3); flex-shrink: 0; position: relative; }
        /* 這裡放媽咪的頭像 (使用 Flaticon 卡通 Icon 代替) */
        .brenda-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 對話框氣泡 */
        .speech-bubble { background: var(--bubble); border-radius: 18px; padding: 20px; position: relative; border: 1px solid #333; flex-grow: 1; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        /* 氣泡尾巴 */
        .speech-bubble::before { content: ''; position: absolute; left: -10px; top: 25px; border-width: 10px 10px 10px 0; border-style: solid; border-color: transparent var(--bubble) transparent transparent; }
        
        #speech { font-size: 17px; line-height: 1.5; font-weight: 700; color: #fff; margin:0; font-style: italic; }

        /* 輸入區與按鈕 */
        .input-card { background: var(--card); border-radius: 20px; padding: 20px; width: 100%; max-width: 420px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { display: flex; flex-direction: column; gap: 15px; }
        input { background: #0b0b0b; border: 2px solid #333; color: #fff; padding: 18px; font-size: 30px; border-radius: 12px; text-align: center; outline: none; transition: 0.3s; width: 100%; }
