<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Momma Says</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --bg: #0b0b0b; --accent: #ff4500; --text: #ffffff; --secondary: #222; }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
        
        .streak-container { text-align: center; margin-bottom: 30px; }

        .brenda-avatar { font-size: 40px; margin-bottom: -10px; z-index: 1; }

        .brenda-box::after { content: ''; position: absolute; top: -10px; left: 30px; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 10px solid var(--secondary); }
        .brenda-name { color: var(--accent); font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; }
        #brendaSpeech { font-size: 18px; line-height: 1.4; font-weight: 600; font-style: italic; }
