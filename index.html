<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Momma Says</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #000; --accent: #ff4500; --text: #fff; --gold: #ffd700; --bubble: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; margin:0; }
        .header { text-align: center; margin-bottom: 20px; }
        .fire { font-size: 50px; filter: drop-shadow(0 0 10px var(--accent)); }
        .streak-val { font-size: 20px; font-weight: 900; color: var(--gold); margin-top: 5px; }
        .brenda-wrapper { display: flex; align-items: flex-start; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 25px; }
        .brenda-icon { font-size: 50px; background: #1a1a1a; border-radius: 50%; padding: 10px; border: 2px solid var(--accent); flex-shrink: 0; }
        .bubble { background: var(--bubble); border-radius: 15px; padding: 15px; position: relative; border: 1px solid #333; flex-grow: 1; min-height: 80px; display: flex; align-items: center; }
        .bubble::before { content: ''; position: absolute; left: -8px; top: 20px; border-width: 8px 8px 8px 0; border-style: solid; border-color: transparent var(--bubble) transparent transparent; }
        #speech { font-size: 16px; line-height: 1.5; font-weight: bold; margin: 0; font-style: italic; color: #fff; }
        .card { background: #111; border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; border: 1px solid #222; }
        input { background: #000; border: 2px solid #333; color: #fff; padding: 15px; font-size: 28px; border-radius: 10px; text-align: center; width: 100%; margin-bottom: 15px; outline: none; }
        button { background: var(--accent); color: #fff; border: none; padding: 15px; font-size: 18px; font-weight: 900; border-radius: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 0 #802300; }
        button:active { transform: translateY(2px); box-shadow: none; }
        .water-box { margin-top: 30px; width: 100%; max-width: 400px; text-align: center; background: rgba(0,251,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(0,251,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .drop { font-size: 32px; cursor: pointer; opacity: 0.15; transition: 0.3s; }
        .drop.active { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 8px #00fbff); }
        .footer { margin-top: auto; font-size: 12px; color: #444; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="fire">🔥</div>
        <div class="streak-val"><span id="streak">0</span> 天紀錄</div>
    </div>

    <div class="brenda-wrapper">
        <div class="brenda-icon">👩🏾‍</div>
        <div class="bubble">
            <p id="speech">載入中...</p>
        </div>
    </div>

    <div class="card">
        <input type="number" id="weight" placeholder="0.0" step="0.1" inputmode="decimal">
        <button onclick="log()">給我寫下來！</button>
    </div>

    <div class="water-box">
        <div style="font-size: 12px; color: #00fbff; font-weight: bold;">💧 3000cc 飲水進度</div>
        <div class="grid" id="waterGrid"></div>
        <div id="wLabel" style="font-size: 11px; margin-top: 10px; color: #00fbff; opacity: 0.6;">0 / 3000 cc</div>
    </div>

    <div id="fast" class="footer"></div>
