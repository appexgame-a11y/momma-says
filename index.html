<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Momma Says</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="fire">🔥</div>
        <div class="streak-val">STREAK: <span id="streakCount">0</span> DAYS</div>
    </div>

    <div class="brenda-zone">
        <div class="brenda-zone">
        <div class="momma-head">
            <span class="eye eye-l"></span>
            <span class="eye eye-r"></span>
            <span class="mouth"></span>
            <div class="earring earring-l"></div>
            <div class="earring earring-r"></div>
            <div class="knot"></div>
        </div>
        <div class="bubble"><p id="speech">載入中...</p></div>
    </div>
        <div class="bubble"><p id="speech">載入中...</p></div>
    </div>

    <div class="card">
        <input type="number" id="weightVal" placeholder="0.0" step="0.1" inputmode="decimal">
        <button onclick="saveLog()">寫下來，別找藉口！</button>
    </div>

    <div class="water-section">
        <div class="water-title">💧 3000cc 飲水挑戰</div>
        <div class="grid" id="waterGrid"></div>
    </div>

    <div id="fastStatus" class="footer"></div>

    <script src="script.js"></script>
</body>
</html>
