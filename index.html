<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Momma Says</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #050505; --accent: #ff4500; --text: #f0f0f0; --gold: #ffd700; }
        body { background: var(--bg); color: var(--text); font-family: "PingFang TC", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px 20px; min-height: 100vh; margin:0; }
        .header { text-align: center; margin-bottom: 25px; }
        .fire { font-size: 60px; filter: drop-shadow(0 0 10px var(--accent)); }
        .streak-val { font-size: 26px; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        
        .brenda-card { background: #1a1a1a; border: 2px solid #333; border-left: 8px solid var(--accent); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; margin: 20px 0; position: relative; }
        .brenda-label { position: absolute; top: -12px; left: 20px; background: var(--accent); color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 5px; font-weight: bold; }
        #speech { font-size: 19px; line-height: 1.6; font-weight: 700; color: #fff; }
        
        .input-area { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        input { background: #111; border: 2px solid #444; color: #fff; padding: 18px; font-size: 30px; border-radius: 12px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255,69,0,0.3); }
        button { background: var(--accent); color: #fff; border: none; padding: 20px; font-size: 20px; font-weight: 900; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #802300; }
        button:active { transform: translateY(4px); box-shadow: none; }
        
        .water-section { margin-top: 30px; width: 100%; max-width: 400px; background: rgba(0,251,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(0,251,255,0.2); text-align: center; }
        .water-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .drop { font-size: 35px; cursor: pointer; opacity: 0.15; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .drop.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px #00fbff); }
        
        .fast-timer { margin-top: 40px; font-size: 14px; font-weight: bold; color: #777; padding: 10px; border-top: 1px solid #222; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="fire">🔥</div>
        <div class="streak-val"><span id="streak">0</span> 天紀錄</div>
    </div>

    <div class="brenda-card">
        <div class="brenda-label">MOMMA BRENDA 📢</div>
        <p id="speech">「妳還站在那看什麼看？過來給我量體重，快點！」</p>
    </div>

    <div class="input-area">
        <input type="number" id="weight" placeholder="0.0" step="0.1" inputmode="decimal">
        <button onclick="logData()">寫下來！別給我找藉口！</button>
    </div>

    <div class="water-section">
        <div style="font-size: 14px; color: #00fbff; font-weight: 800; letter-spacing: 1px;">💧 3000cc 飲水挑戰</div>
        <div class="water-grid" id="waterGrid">
            <span class="drop" onclick="drink(0)">💧</span><span class="drop" onclick="drink(1)">💧</span>
            <span class="drop" onclick="drink(2)">💧</span><span class="drop" onclick="drink(3)">💧</span>
            <span class="drop" onclick="drink(4)">💧</span><span class="drop" onclick="drink(5)">💧</span>
            <span class="drop" onclick="drink(6)">💧</span><span class="drop" onclick="drink(7)">💧</span>
        </div>
        <div id="waterLabel" style="font-size: 12px; margin-top: 12px; color: #00fbff; opacity: 0.8;">目前進度: 0 / 3000 cc</div>
    </div>

    <div id="fastMode" class="fast-timer">正在掃描妳有沒有偷吃東西...</div>

    <script>
        let store = JSON.parse(localStorage.getItem('momma_v3')) || { streak: 0, lastLog: null, water: 0 };

        function init() {
            document.getElementById('streak').innerText = store.streak;
            updateWaterUI();
            checkFast();
            updateSpeech();
        }

        function logData() {
            const w = document.getElementById('weight').value;
            const today = new Date().toDateString();
            if(!w) return alert("妳是腦袋空空還是怎樣？輸入數字！");
            
            if(store.lastLog === today) {
                document.getElementById('speech').innerText = "「噢拜託，妳今天已經量過了！去給我在跑步機上待著，別煩我！」";
                return;
            }
            store.streak++;
            store.lastLog = today;
            store.water = 0; 
            save();
            document.getElementById('streak').innerText = store.streak;
            document.getElementById('speech').innerText = "「紀錄好了！聽著，明天要是數字往上升，妳就死定了，知道嗎？」";
            updateWaterUI();
        }
